<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發布淨值表 ｜ Admin ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
window.ensureXLSX=function(){return new Promise(function(res,rej){
  if(window.XLSX)return res();
  var urls=['https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js','https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'],i=0;
  (function next(){ if(window.XLSX)return res();
    if(i>=urls.length)return rej(new Error('表格解析庫加載失敗，請刷新或更換瀏覽器'));
    var s=document.createElement('script');s.src=urls[i++];s.onload=function(){window.XLSX?res():next()};s.onerror=next;document.head.appendChild(s);
  })();
});}
</script>
<script src="assets/yc-analytics.js"></script>
<script src="assets/yc-admin.js"></script>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="./">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="admin">Admin 總覽</a></li></ul></nav>
</div></header>

<div class="wrap">
  <div class="page-hero">
    <div class="crumb">ADMIN / PUBLISH</div>
    <div class="topbar">
      <h1 style="margin:0"><small>Backstage · 管理後台</small>發布淨值表</h1>
      <div class="who" id="who"></div>
    </div>
    <div id="adminnav"></div>
  </div>

  <div id="gate" class="card" style="text-align:center;padding:60px">
    <div class="log dim" style="display:inline-block" id="gatemsg">正在驗證會話…</div>
  </div>

  <div id="panel" style="display:none">

    <div class="card">
      <h3>發布淨值表</h3>
      <label class="drop2" id="dz">點此或拖入基金工作簿（Yi_Capital_Manager 導出的 .xlsx）<input type="file" id="fp" accept=".xlsx,.xlsm" style="display:none"></label>
      <div id="pv" style="display:none">
        <div class="preview" id="pv-stats"></div>
        <div class="log dim" id="pv-note"></div>
      </div>
      <div style="margin-top:18px"><button class="btn" id="publish" disabled>🚀 發布到網站</button></div>
      <div class="log" id="publog" style="margin-top:16px">選擇文件後，頁面會先用網站同一套引擎試算校驗，再發布。發布成功會自動同步賬本 → 每日美股收盤後約 1 小時自動續算淨值。</div>
    </div>

  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const {api, plog, $}=YCAdmin;
  let fileBuf=null, fileName=null, analyzed=null;
  YCAdmin.gate();

  async function pick(f){
    if(!f) return;
    fileName=f.name; fileBuf=await f.arrayBuffer();
    try{
      await ensureXLSX();
      const wb=XLSX.read(fileBuf,{type:'array'});
      const sheets={}; wb.SheetNames.forEach(n=>sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:true,defval:null}));
      analyzed=YC.analyze(sheets);
      if(analyzed.error) throw new Error(analyzed.error);
      const M=analyzed.metrics, p=(v,d=1)=>(v*100).toFixed(d)+'%';
      $('pv').style.display='block';
      $('pv-stats').innerHTML=[
        ['數據截至',analyzed.end],['交易日',M.days+' 天'],
        ['累計回報',(M.totalRet>=0?'+':'')+p(M.totalRet)],['最大回撤',p(M.maxDD)],
        ['夏普',M.sharpe.toFixed(2)],['持倉',analyzed.assets.length+' 只'],
      ].map(([k,v])=>`<div class="stat"><div class="v">${v}</div><div class="k">${k}</div></div>`).join('');
      $('pv-note').textContent='✓ 校驗通過：'+fileName+'（'+(fileBuf.byteLength/1024).toFixed(0)+' KB）';
      $('publish').disabled=false;
      $('publog').textContent='文件就緒，可以發布。';
    }catch(e){
      analyzed=null; $('publish').disabled=true;
      $('pv').style.display='block'; $('pv-stats').innerHTML='';
      $('pv-note').textContent='✗ 校驗失敗：'+e.message;
    }
  }
  $('fp').addEventListener('change',e=>pick(e.target.files[0]));
  const dz=$('dz');
  ['dragover','drop'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault()));
  dz.addEventListener('dragover',()=>dz.classList.add('over'));
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  document.addEventListener('drop',e=>{ dz.classList.remove('over'); const f=e.dataTransfer&&e.dataTransfer.files[0]; if(f)pick(f); });

  function toBase64(buf){
    const bytes=new Uint8Array(buf); let bin='';
    for(let i=0;i<bytes.length;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
    return btoa(bin);
  }
  $('publish').onclick=async ()=>{
    if(!fileBuf) return;
    const el=$('publog'); el.innerHTML=''; $('publish').disabled=true;
    try{
      plog(el,'上傳中（'+fileName+'）…');
      const j=await api('/api/publish',{method:'POST',body:JSON.stringify({content_b64:toBase64(fileBuf), message:'data: 更新淨值表至 '+(analyzed?analyzed.end:'')+'（via Portal）'})});
      plog(el,'✓ 已提交：'+(j.commit||'').slice(0,7),'ok');
      plog(el,'✓ 發布完成。GitHub Pages 將在約 1 分鐘內自動重新部署。','ok');
      if(j.url) plog(el,'提交記錄：'+j.url,'dim');
      try{
        const last=analyzed.navRows[analyzed.navRows.length-1];
        const baseMV=(last.totalAssets!=null?last.totalAssets:((last.cash||0)+(last.marketValue||0)));
        const led={ portfolio:'us',
          positions:analyzed.assets.filter(a=>a.ticker&&isFinite(a.qty)&&a.qty).map(a=>({t:a.ticker,q:a.qty})),
          cash:last.cash||0, lastDate:last.date, baseMV:baseMV, lastUnitNav:last.nav, units:last.units||0 };
        const lj=await api('/api/ledger',{method:'POST',body:JSON.stringify(led)});
        plog(el,'✓ 賬本已同步（'+lj.positions+' 只持倉，基準 '+led.lastDate+'）——每日自動續算淨值已就緒。','ok');
      }catch(e){ plog(el,'△ 賬本同步失敗（不影響本次發布）：'+e.message,'dim'); }
    }catch(e){ plog(el,'✗ 發布失敗：'+e.message,'err'); }
    $('publish').disabled=false;
  };
})();
</script>
</body>
</html>
