<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郵件中心 ｜ Admin ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="assets/yc-admin.js"></script>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="./">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="admin">Admin 總覽</a></li></ul></nav>
</div></header>

<div class="wrap">
  <div class="page-hero">
    <div class="crumb">ADMIN / MAIL</div>
    <div class="topbar">
      <h1 style="margin:0"><small>Backstage · 管理後台</small>郵件中心</h1>
      <div class="who" id="who"></div>
    </div>
    <div id="adminnav"></div>
  </div>

  <div id="gate" class="card" style="text-align:center;padding:60px">
    <div class="log dim" style="display:inline-block" id="gatemsg">正在驗證會話…</div>
  </div>

  <div id="panel" style="display:none">

    <div class="card">
      <h3>郵件中心（群發 / 指定發送）</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:640px">
        <div>
          <label style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px">發件身份</label>
          <select id="bc-sender" style="width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:10px 12px;font-size:13.5px">
            <option value="insight">insight@yicapital.co（僅發給訂閱者）</option>
            <option value="information">information@yicapital.co（可發任何用戶，見條款04）</option>
          </select>
        </div>
        <div>
          <label style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px">收件範圍</label>
          <select id="bc-mode" style="width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:10px 12px;font-size:13.5px">
            <option value="all">全部符合條件的用戶</option>
            <option value="selected">指定用戶（下方勾選）</option>
          </select>
        </div>
      </div>
      <div id="bc-pick" style="display:none;margin-top:14px">
        <div class="searchline" style="margin-bottom:10px">
          <input id="bc-q" placeholder="搜索用戶名或郵箱後勾選…" autocomplete="off">
          <span class="dim" id="bc-picked" style="font-family:var(--mono);font-size:12px">已選 0 人</span>
        </div>
        <div id="bc-recipients" style="border:1px solid var(--line);border-radius:8px;padding:12px 16px;max-height:220px;overflow:auto"></div>
      </div>
      <div style="display:flex;gap:14px;align-items:center;margin-top:14px;flex-wrap:wrap">
        <label style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px">格式</label>
        <select id="bc-format" style="background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:9px 12px;font-size:13px">
          <option value="text">純文字（自動排版）</option>
          <option value="html">研報簡報（HTML 模板）</option>
        </select>
        <button class="btn2" id="bc-loadtpl">📄 載入騰訊研報示例模板</button>
      </div>
      <div style="margin-top:14px"><input id="bc-subject" placeholder="郵件主題" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:11px 14px;font-size:14px"></div>
      <div style="margin-top:12px"><textarea id="bc-content" rows="8" placeholder="正文（純文字，換行會保留；頁腳與退訂說明自動附加）" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:12px 14px;font-size:14px;font-family:var(--zh);resize:vertical"></textarea></div>
      <div style="margin-top:14px"><button class="btn" id="bc-send">✉️ 發送</button></div>
      <div class="log" id="bc-log" style="margin-top:14px">insight 身份自動跳過未訂閱用戶；information 身份可觸達全部用戶（條款 04 授權的服務通知）。建議先「指定用戶」發給自己預覽。</div>
    </div>

  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const {api, plog, $}=YCAdmin;
  let USERS=[]; const PICKED=new Set();
  YCAdmin.gate(async ()=>{
    try{ const j=await api('/api/users'); USERS=j.users; }catch(e){ plog($('bc-log'),'✗ 用戶列表載入失敗：'+e.message,'err'); }
  });

  function drawRecipients(){
    const q=$('bc-q').value.trim().toLowerCase();
    const list=USERS.filter(u=>!q || (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q));
    $('bc-recipients').innerHTML=list.length?list.map(u=>`<label style="display:flex;gap:8px;align-items:center;padding:4px 0;font-size:13px;color:#cdd6e3;cursor:pointer">
      <input type="checkbox" class="bc-u" value="${u.username}" ${PICKED.has(u.username)?'checked':''} style="accent-color:#22d3ee"> ${u.username}
      <span class="dim" style="font-family:var(--mono);font-size:11px">${u.email||''}</span>
      ${u.newsletter?'<span class="badge on">訂閱</span>':'<span class="badge off">未訂閱</span>'}</label>`).join('')
      :'<span class="dim">沒有匹配的用戶</span>';
    $('bc-recipients').querySelectorAll('.bc-u').forEach(c=>c.onchange=()=>{
      c.checked?PICKED.add(c.value):PICKED.delete(c.value);
      $('bc-picked').textContent='已選 '+PICKED.size+' 人';
    });
  }
  $('bc-q').addEventListener('input',drawRecipients);
  $('bc-mode').addEventListener('change',()=>{
    const sel=$('bc-mode').value==='selected';
    $('bc-pick').style.display=sel?'block':'none';
    if(sel) drawRecipients();
  });

  $('bc-send').onclick=async ()=>{
    const el=$('bc-log'); el.innerHTML='';
    const body={ sender:$('bc-sender').value, mode:$('bc-mode').value, format:$('bc-format').value,
      subject:$('bc-subject').value.trim(), content:$('bc-content').value.trim() };
    if(body.mode==='selected'){
      body.usernames=[...PICKED];
      if(!body.usernames.length){ plog(el,'✗ 請至少勾選一位收件人（可先搜索）','err'); return; }
    }
    if(!body.subject||!body.content){ plog(el,'✗ 主題和正文不能為空','err'); return; }
    if(!confirm('確認以 '+body.sender+'@ 身份發送？'+(body.usernames?('（'+body.usernames.length+' 位指定收件人）'):'（全部符合條件用戶）'))) return;
    $('bc-send').disabled=true; plog(el,'發送中…');
    try{ const j=await api('/api/broadcast',{method:'POST',body:JSON.stringify(body)});
      plog(el,'✓ 已發送 '+j.sent+' 封'+(j.failed?('，失敗 '+j.failed):'')+(j.skipped?('，跳過未訂閱 '+j.skipped+' 人'):''),'ok');
    }catch(e){ plog(el,'✗ '+e.message,'err'); }
    $('bc-send').disabled=false;
  };

  $('bc-loadtpl').onclick=async ()=>{
    try{
      const r=await fetch('email-templates/tencent-brief.html?v='+Date.now(),{cache:'no-store'});
      if(!r.ok) throw new Error('模板文件未找到（email-templates/tencent-brief.html）');
      $('bc-content').value=await r.text();
      $('bc-format').value='html';
      if(!$('bc-subject').value) $('bc-subject').value='Yi Capital Insights ｜ 騰訊控股（0700.HK）：流量帝國的價值重估時刻';
      plog($('bc-log'),'✓ 已載入研報模板；直接改文字即可（不要動 style 屬性）。','ok');
    }catch(e){ plog($('bc-log'),'✗ '+e.message,'err'); }
  };
})();
</script>
</body>
</html>
