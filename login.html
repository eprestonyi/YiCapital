<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  .login-wrap{max-width:440px;margin:60px auto 100px;padding:0 24px}
  .lg-tabs{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:26px}
  .lg-tabs button{flex:1;background:none;border:none;color:var(--muted);padding:13px 0;font-family:var(--sans);font-size:14px;cursor:pointer;border-right:1px solid var(--line)}
  .lg-tabs button:last-child{border-right:none}
  .lg-tabs button.on{background:var(--panel);color:var(--cyan);font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:32px}
  .card h2{font-family:var(--sans);color:#fff;font-size:20px;margin-bottom:6px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:22px;line-height:1.7}
  .fld{margin-bottom:16px}
  .fld label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;text-transform:uppercase}
  .fld input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:12px 14px;font-size:14.5px;font-family:var(--zh)}
  .fld input:focus{outline:none;border-color:var(--cyan)}
  .btn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04070d;border:none;border-radius:6px;padding:13px;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}
  .btn:disabled{opacity:.4}
  .msg{margin-top:16px;font-family:var(--mono);font-size:12.5px;line-height:1.8;min-height:20px}
  .msg.ok{color:var(--up)} .msg.err{color:var(--down)}
  .cfg-warn{border:1px solid var(--down);border-radius:8px;padding:14px 18px;color:var(--down);font-size:13px;line-height:1.8;margin-bottom:22px}
  .cfg-warn code{font-family:var(--mono);background:var(--bg);padding:1px 6px;border-radius:4px;color:#cdd6e3}
  .divider{text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;margin:16px 0 12px}
</style>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="index.html">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="index.html">← 返回首頁</a></li></ul></nav>
</div></header>

<div class="login-wrap">
  <div id="cfgwarn" class="cfg-warn" style="display:none">尚未配置後端地址：部署 Cloudflare Worker 後，把 workers.dev 地址填入 <code>assets/portal-config.js</code> 的 <code>YC_API</code>（詳見 worker/DEPLOY.md）。</div>

  <div class="lg-tabs">
    <button class="on" data-mode="admin">Admin Login</button>
    <button data-mode="guest">Guest Login</button>
    <button data-mode="signup">Guest Sign up</button>
  </div>

  <div class="card">
    <h2 id="ttl">管理員登入</h2>
    <div class="sub" id="sub">登入後可發布淨值表、管理帳號。</div>

    <div class="fld"><label id="ulabel">用戶名 Username</label><input id="u" autocomplete="username"></div>
    <div class="fld" id="emailwrap" style="display:none"><label>郵箱 Email</label><input id="email" type="email" autocomplete="email" placeholder="用於接收驗證碼"></div>
    <div class="fld"><label>密碼 Password</label><input id="p" type="password" autocomplete="current-password"></div>
    <div class="fld" id="p2wrap" style="display:none"><label>確認密碼 Confirm</label><input id="p2" type="password" autocomplete="new-password"></div>
    <div class="fld" id="codewrap" style="display:none"><label>郵箱驗證碼 Verification Code</label><input id="vcode" inputmode="numeric" placeholder="6 位數字"></div>

    <button class="btn" id="go">登入</button>
    <div id="gwrap" style="display:none"><div class="divider">─── 或 ───</div><div id="gbtn" style="display:flex;justify-content:center"></div></div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const API=(window.YC_API||'').replace(/\/+$/,'');
  if(!API) $('cfgwarn').style.display='block';

  let mode='admin';
  let pendingEmail=null;     // 郵箱驗證碼待確認
  let setupToken=null;       // Google 新用戶待設置用戶名密碼

  const COPY={
    admin:['管理員登入','登入後可發布淨值表、管理帳號。','登入'],
    guest:['訪客登入','用戶名或郵箱＋密碼；Google 註冊的帳號也可直接點下方 Google 按鈕。','登入'],
    signup:['訪客註冊','起一個用戶名和密碼，郵箱用於驗證；或直接用 Google 註冊（之後同樣自設帳密）。','註冊'],
  };

  function setMode(m){
    mode=m;
    document.querySelectorAll('.lg-tabs button').forEach(x=>x.classList.toggle('on',x.dataset.mode===m));
    $('ttl').textContent=COPY[m][0]; $('sub').textContent=COPY[m][1]; $('go').textContent=COPY[m][2];
    $('emailwrap').style.display=m==='signup'?'block':'none';
    $('p2wrap').style.display=m==='signup'?'block':'none';
    $('codewrap').style.display='none';
    $('ulabel').textContent=m==='guest'?'用戶名或郵箱 Username / Email':'用戶名 Username';
    pendingEmail=null; setupToken=null;
    $('msg').textContent=''; $('msg').className='msg';
    $('gwrap').style.display=(m!=='admin'&&GCID&&API)?'block':'none';
  }
  document.querySelectorAll('.lg-tabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));

  async function api(path,body){
    const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json().catch(()=>({error:'響應解析失敗'}));
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    return j;
  }
  function sessionIn(j,msg){
    sessionStorage.setItem('yc-token',j.token); sessionStorage.setItem('yc-role',j.role); sessionStorage.setItem('yc-user',j.username);
    if(j.role==='admin'){ msg.className='msg ok'; msg.textContent='✓ 登入成功，正在進入後台…'; location.href='admin.html'; }
    else{ msg.className='msg ok'; msg.textContent='✓ 登入成功（'+j.username+'）。訪客區功能即將開放。'; setTimeout(()=>location.href='index.html',1600); }
  }

  /* ── Google：老用戶直接進；新用戶轉入「設置用戶名密碼」步驟 ── */
  const GCID=window.YC_GOOGLE_CLIENT_ID||'';
  if(GCID&&API){
    const init=()=>{ if(!window.google||!google.accounts){ setTimeout(init,300); return; }
      google.accounts.id.initialize({ client_id:GCID, callback:async resp=>{
        const msg=$('msg'); msg.className='msg'; msg.textContent='驗證 Google 帳號…';
        try{
          const j=await api('/api/google',{credential:resp.credential});
          if(j.needSetup){
            setupToken=j.setupToken; pendingEmail=null;
            setModeUI_googleSetup(j.email);
          }else sessionIn(j,msg);
        }catch(e){ msg.className='msg err'; msg.textContent='✗ '+e.message; }
      }});
      google.accounts.id.renderButton($('gbtn'),{theme:'filled_black',size:'large',text:'continue_with',width:300});
      $('gwrap').style.display=(mode!=='admin')?'block':'none';
    }; init();
  }
  function setModeUI_googleSetup(email){
    // Google 驗證通過 → 讓用戶自己起用戶名和密碼
    document.querySelectorAll('.lg-tabs button').forEach(x=>x.classList.toggle('on',x.dataset.mode==='signup'));
    $('ttl').textContent='設置你的帳號';
    $('sub').textContent='Google 驗證成功（'+email+'）。給自己起一個用戶名和密碼——之後用「用戶名+密碼」或 Google 登入都可以。';
    $('emailwrap').style.display='none'; $('codewrap').style.display='none';
    $('p2wrap').style.display='block';
    $('ulabel').textContent='用戶名 Username';
    $('u').value=''; $('p').value=''; $('p2').value='';
    $('go').textContent='創建帳號'; $('gwrap').style.display='none';
    $('msg').className='msg ok'; $('msg').textContent='✓ Google 驗證成功，請設置帳號';
  }

  /* ── 主按鈕 ── */
  $('go').onclick=async ()=>{
    const msg=$('msg'); msg.className='msg'; msg.textContent='';
    if(!API){ msg.className='msg err'; msg.textContent='後端未配置（見上方提示）'; return; }
    const u=$('u').value.trim(), p=$('p').value;
    $('go').disabled=true;
    try{
      /* Google 新用戶：創建帳號 */
      if(setupToken){
        if(!u||!p) throw new Error('請填寫用戶名和密碼');
        if(p!==$('p2').value) throw new Error('兩次密碼不一致');
        const j=await api('/api/google/complete',{setupToken,username:u,password:p});
        setupToken=null; sessionIn(j,msg);
      }
      /* 郵箱驗證碼確認 */
      else if(mode==='signup'&&pendingEmail){
        const code=$('vcode').value.trim();
        if(!/^\d{6}$/.test(code)) throw new Error('請輸入 6 位驗證碼');
        await api('/api/verify',{email:pendingEmail,code});
        pendingEmail=null; $('codewrap').style.display='none'; $('go').textContent='註冊';
        msg.className='msg ok'; msg.textContent='✓ 驗證成功！請切換到 Guest Login 登入';
      }
      /* 註冊：用戶名+郵箱+密碼 */
      else if(mode==='signup'){
        const email=$('email').value.trim();
        if(!u||!p||!email) throw new Error('請填寫用戶名、郵箱和密碼');
        if(p!==$('p2').value) throw new Error('兩次密碼不一致');
        const j=await api('/api/signup',{username:u,password:p,email});
        if(j.needCode){
          pendingEmail=email.toLowerCase();
          $('codewrap').style.display='block'; $('go').textContent='提交驗證碼';
          msg.className='msg ok'; msg.textContent='✓ '+j.message+'，請查收郵件（含垃圾箱）';
        }else{ msg.className='msg ok'; msg.textContent='✓ 註冊成功，請切換到 Guest Login 登入'; }
      }
      /* 登入 */
      else{
        if(!u||!p) throw new Error('請填寫帳號和密碼');
        const j=await api('/api/login',{username:u,password:p});
        if(mode==='admin'&&j.role!=='admin') throw new Error('此帳號不是管理員，請用 Guest Login');
        sessionIn(j,msg);
      }
    }catch(e){ msg.className='msg err'; msg.textContent='✗ '+e.message; }
    $('go').disabled=false;
  };
  $('p').addEventListener('keydown',e=>{ if(e.key==='Enter'&&mode!=='signup')$('go').click(); });
})();
</script>
</body>
</html>
