<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<style>
  .login-wrap{max-width:440px;margin:60px auto 100px;padding:0 24px}
  .lg-tabs{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:26px}
  .lg-tabs button{flex:1;background:none;border:none;color:var(--muted);padding:13px 0;font-family:var(--sans);font-size:14px;cursor:pointer;border-right:1px solid var(--line)}
  .lg-tabs button:last-child{border-right:none}
  .lg-tabs button.on{background:var(--panel);color:var(--cyan);font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:32px}
  .card h2{font-family:var(--sans);color:#fff;font-size:20px;margin-bottom:6px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  .fld{margin-bottom:16px}
  .fld label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;text-transform:uppercase}
  .fld input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:12px 14px;font-size:14.5px;font-family:var(--zh)}
  .fld input:focus{outline:none;border-color:var(--cyan)}
  .btn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04070d;border:none;border-radius:6px;padding:13px;font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer;margin-top:6px}
  .btn:disabled{opacity:.4}
  .msg{margin-top:16px;font-family:var(--mono);font-size:12.5px;line-height:1.8;min-height:20px}
  .msg.ok{color:var(--up)} .msg.err{color:var(--down)}
  .cfg-warn{border:1px solid var(--down);border-radius:8px;padding:14px 18px;color:var(--down);font-size:13px;line-height:1.8;margin-bottom:22px}
  .cfg-warn code{font-family:var(--mono);background:var(--bg);padding:1px 6px;border-radius:4px;color:#cdd6e3}
</style>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="index.html">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="index.html">← 返回首頁</a></li></ul></nav>
</div></header>

<div class="login-wrap">
  <div id="cfgwarn" class="cfg-warn" style="display:none">尚未配置後端地址：部署 Cloudflare Worker 後，把 workers.dev 地址填入 <code>assets/portal-config.js</code> 的 <code>YC_API</code>（詳見 README「登入 Portal」一節）。</div>

  <div class="lg-tabs">
    <button class="on" data-mode="admin">Admin Login</button>
    <button data-mode="guest">Guest Login</button>
    <button data-mode="signup">Guest Sign up</button>
  </div>

  <div class="card">
    <h2 id="ttl">管理員登入</h2>
    <div class="sub" id="sub">登入後可發布淨值表、管理帳號。</div>
    <div class="fld"><label>用戶名 Username</label><input id="u" autocomplete="username"></div>
    <div class="fld"><label>密碼 Password</label><input id="p" type="password" autocomplete="current-password"></div>
    <div class="fld" id="p2wrap" style="display:none"><label>確認密碼 Confirm</label><input id="p2" type="password" autocomplete="new-password"></div>
    <button class="btn" id="go">登入</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const API=(window.YC_API||'').replace(/\/+$/,'');
  if(!API) $('cfgwarn').style.display='block';
  let mode='admin';
  const COPY={
    admin:['管理員登入','登入後可發布淨值表、管理帳號。','登入'],
    guest:['訪客登入','訪客區功能即將開放，敬請期待。','登入'],
    signup:['訪客註冊','創建一個訪客帳號（2–24 位用戶名，密碼至少 6 位）。','註冊'],
  };
  document.querySelectorAll('.lg-tabs button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.lg-tabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); mode=b.dataset.mode;
    $('ttl').textContent=COPY[mode][0]; $('sub').textContent=COPY[mode][1]; $('go').textContent=COPY[mode][2];
    $('p2wrap').style.display=mode==='signup'?'block':'none';
    $('msg').textContent=''; $('msg').className='msg';
  });

  async function api(path,body){
    const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json().catch(()=>({error:'響應解析失敗'}));
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    return j;
  }

  $('go').onclick=async ()=>{
    const u=$('u').value.trim(), p=$('p').value;
    const msg=$('msg'); msg.className='msg'; msg.textContent='';
    if(!API){ msg.className='msg err'; msg.textContent='後端未配置（見上方提示）'; return; }
    if(!u||!p){ msg.className='msg err'; msg.textContent='請填寫用戶名和密碼'; return; }
    $('go').disabled=true;
    try{
      if(mode==='signup'){
        if(p!==$('p2').value) throw new Error('兩次密碼不一致');
        await api('/api/signup',{username:u,password:p});
        msg.className='msg ok'; msg.textContent='✓ 註冊成功，請切換到 Guest Login 登入';
      }else{
        const j=await api('/api/login',{username:u,password:p});
        if(mode==='admin' && j.role!=='admin') throw new Error('此帳號不是管理員，請用 Guest Login');
        sessionStorage.setItem('yc-token',j.token);
        sessionStorage.setItem('yc-role',j.role);
        sessionStorage.setItem('yc-user',j.username);
        if(j.role==='admin'){ msg.className='msg ok'; msg.textContent='✓ 登入成功，正在進入後台…'; location.href='admin.html'; }
        else{ msg.className='msg ok'; msg.textContent='✓ 登入成功。訪客區功能即將開放，可先瀏覽網站。'; setTimeout(()=>location.href='index.html',1600); }
      }
    }catch(e){ msg.className='msg err'; msg.textContent='✗ '+e.message; }
    $('go').disabled=false;
  };
  $('p').addEventListener('keydown',e=>{ if(e.key==='Enter')$('go').click(); });
})();
</script>
</body>
</html>
