<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收件箱 ｜ Admin ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="assets/yc-admin.js"></script>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="./">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="admin">Admin 總覽</a></li></ul></nav>
</div></header>

<div class="wrap">
  <div class="page-hero">
    <div class="crumb">ADMIN / INBOX</div>
    <div class="topbar">
      <h1 style="margin:0"><small>Backstage · 管理後台</small>收件箱</h1>
      <div class="who" id="who"></div>
    </div>
    <div id="adminnav"></div>
  </div>

  <div id="gate" class="card" style="text-align:center;padding:60px">
    <div class="log dim" style="display:inline-block" id="gatemsg">正在驗證會話…</div>
  </div>

  <div id="panel" style="display:none">

    <div class="card">
      <h3>收件箱（insight@ / information@）<button class="btn2" id="ib-refresh" style="margin-left:14px">刷新</button></h3>
      <div id="inbox" class="log dim">載入中…</div>
    </div>

  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const {api, $}=YCAdmin;
  YCAdmin.gate(loadInbox);
  $('ib-refresh').onclick=loadInbox;
  async function loadInbox(){
    const el=$('inbox');
    try{
      const j=await api('/api/inbox',{method:'GET'});
      if(!j.items.length){ el.className='log dim'; el.textContent='暫無來信。配置 Cloudflare Email Routing 後，發到 insight@/information@ 的郵件會出現在這裡（見 DEPLOY.md）。'; return; }
      el.className='';
      el.innerHTML='<table class="m"><thead><tr><th>時間</th><th>信箱</th><th>發件人</th><th>主題</th><th></th></tr></thead><tbody>'+
        j.items.map(it=>`<tr><td style="white-space:nowrap">${it.date.replace('T',' ').slice(0,16)}</td>
          <td>${it.box==='insight'?'insight@':'information@'}</td>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${it.from.replace(/</g,'&lt;')}</td>
          <td><a href="#" class="ib-open" data-id="${it.id}" style="color:var(--cyan)">${(it.subject||'(無主題)').replace(/</g,'&lt;')}</a></td>
          <td><button class="btn2 danger ib-del" data-id="${it.id}">刪除</button></td></tr>
          <tr class="ib-body" id="ib-${it.id}" style="display:none"><td colspan="5"><div class="log" style="white-space:pre-wrap">${(it.text||'').replace(/</g,'&lt;')}</div></td></tr>`).join('')+'</tbody></table>';
      el.querySelectorAll('.ib-open').forEach(a=>a.onclick=e=>{e.preventDefault();const r=$('ib-'+a.dataset.id);r.style.display=r.style.display==='none'?'table-row':'none';});
      el.querySelectorAll('.ib-del').forEach(b=>b.onclick=async ()=>{ if(!confirm('刪除這封來信？'))return;
        try{ await api('/api/inbox/delete',{method:'POST',body:JSON.stringify({id:b.dataset.id})}); loadInbox(); }catch(e){alert('✗ '+e.message);} });
    }catch(e){ el.className='log err'; el.textContent='✗ '+e.message; }
  }
})();
</script>
</body>
</html>
