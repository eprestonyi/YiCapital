<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="assets/yc-analytics.js"></script>
<style>
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px 32px;margin-bottom:24px}
  .card h3{font-family:var(--sans);color:#fff;font-size:18px;margin-bottom:18px}
  .btn{display:inline-block;background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04070d;border:none;border-radius:6px;padding:11px 26px;font-family:var(--sans);font-weight:600;font-size:14.5px;cursor:pointer}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn2{background:none;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 14px;font-family:var(--mono);font-size:12px;cursor:pointer}
  .btn2:hover{border-color:var(--cyan);color:var(--cyan)}
  .btn2.danger:hover{border-color:var(--down);color:var(--down)}
  .drop2{border:1px dashed var(--line);border-radius:10px;padding:38px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;cursor:pointer;display:block}
  .drop2:hover,.drop2.over{border-color:var(--cyan);color:var(--cyan)}
  .log{font-family:var(--mono);font-size:12.5px;line-height:2;color:#cdd6e3;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px 18px;min-height:52px;white-space:pre-wrap}
  .ok{color:var(--up)} .err{color:var(--down)} .dim{color:var(--muted)}
  .preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:18px 0}
  .preview .stat{background:var(--bg)}
  .topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px}
  .who{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .who b{color:var(--cyan)}
  table.m td .btn2{margin-right:6px}
  .badge{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--line)}
  .badge.on{color:var(--up);border-color:var(--up)} .badge.off{color:var(--down);border-color:var(--down)}
</style>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="index.html">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="fund-us.html">Fund Page ↗</a></li></ul></nav>
</div></header>

<div class="wrap">
  <div class="page-hero">
    <div class="crumb">ADMIN / DATA & ACCOUNTS</div>
    <div class="topbar">
      <h1 style="margin:0"><small>Backstage · 管理後台</small>Admin Portal</h1>
      <div class="who" id="who"></div>
    </div>
  </div>

  <div id="gate" class="card" style="text-align:center;padding:60px">
    <div class="log dim" style="display:inline-block" id="gatemsg">正在驗證會話…</div>
  </div>

  <div id="panel" style="display:none">

    <!-- ① 發布淨值表 -->
    <div class="card">
      <h3>① 發布淨值表</h3>
      <label class="drop2" id="dz">點此或拖入基金工作簿（Yi_Capital_Manager 導出的 .xlsx）<input type="file" id="fp" accept=".xlsx,.xlsm" style="display:none"></label>
      <div id="pv" style="display:none">
        <div class="preview" id="pv-stats"></div>
        <div class="log dim" id="pv-note"></div>
      </div>
      <div style="margin-top:18px"><button class="btn" id="publish" disabled>🚀 發布到網站</button></div>
      <div class="log" id="publog" style="margin-top:16px">選擇文件後，頁面會先用網站同一套引擎試算校驗，再發布。</div>
    </div>

    <!-- ② 帳號管理 -->
    <div class="card">
      <h3>② 帳號管理</h3>
      <div id="users" class="log dim">載入中…</div>
    </div>

    <!-- ③ 會話 -->
    <div class="card">
      <h3>③ 會話</h3>
      <button class="btn2" id="logout">登出</button>
      <span class="dim" style="font-family:var(--mono);font-size:12px;margin-left:14px">會話有效期 7 天；登出即刻失效。</span>
    </div>
  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const API=(window.YC_API||'').replace(/\/+$/,'');
  const TOK=()=>localStorage.getItem('yc-token');
  let fileBuf=null, fileName=null, analyzed=null;

  async function api(path, opts={}){
    const r=await fetch(API+path,{...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOK(),...(opts.headers||{})}});
    const j=await r.json().catch(()=>({error:'響應解析失敗'}));
    if(r.status===401){ location.href='login.html'; throw new Error('未登入'); }
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    return j;
  }
  function plog(el,msg,cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg; el.appendChild(d); }

  /* ── 門禁 ── */
  (async ()=>{
    if(!API){ $('gatemsg').textContent='後端未配置：請先在 assets/portal-config.js 填入 Worker 地址。'; return; }
    if(!TOK()){ location.href='login.html'; return; }
    try{
      const me=await api('/api/me');
      if(me.role!=='admin'){ $('gatemsg').textContent='此帳號不是管理員。'; setTimeout(()=>location.href='login.html',1500); return; }
      $('who').innerHTML='已登入：<b>'+me.username+'</b>（admin）';
      $('gate').style.display='none'; $('panel').style.display='block';
      loadUsers();
    }catch(e){ $('gatemsg').textContent='✗ '+e.message; }
  })();

  /* ── ① 文件校驗 + 發布 ── */
  async function pick(f){
    if(!f) return;
    fileName=f.name; fileBuf=await f.arrayBuffer();
    try{
      const wb=XLSX.read(fileBuf,{type:'array'});
      const sheets={}; wb.SheetNames.forEach(n=>sheets[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:true,defval:null}));
      analyzed=YC.analyze(sheets);
      if(analyzed.error) throw new Error(analyzed.error);
      const M=analyzed.metrics, p=(v,d=1)=>(v*100).toFixed(d)+'%';
      $('pv').style.display='block';
      $('pv-stats').innerHTML=[
        ['數據截至',analyzed.end],['交易日',M.days+' 天'],
        ['累計回報',(M.totalRet>=0?'+':'')+p(M.totalRet)],['最大回撤',p(M.maxDD)],
        ['夏普',M.sharpe.toFixed(2)],['持倉',analyzed.assets.length+' 只'],
      ].map(([k,v])=>`<div class="stat"><div class="v">${v}</div><div class="k">${k}</div></div>`).join('');
      $('pv-note').textContent='✓ 校驗通過：'+fileName+'（'+(fileBuf.byteLength/1024).toFixed(0)+' KB）';
      $('publish').disabled=false;
      $('publog').textContent='文件就緒，可以發布。';
    }catch(e){
      analyzed=null; $('publish').disabled=true;
      $('pv').style.display='block'; $('pv-stats').innerHTML='';
      $('pv-note').textContent='✗ 校驗失敗：'+e.message;
    }
  }
  $('fp').addEventListener('change',e=>pick(e.target.files[0]));
  const dz=$('dz');
  ['dragover','drop'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault()));
  dz.addEventListener('dragover',()=>dz.classList.add('over'));
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  document.addEventListener('drop',e=>{ dz.classList.remove('over'); const f=e.dataTransfer&&e.dataTransfer.files[0]; if(f)pick(f); });

  function toBase64(buf){
    const bytes=new Uint8Array(buf); let bin='';
    for(let i=0;i<bytes.length;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
    return btoa(bin);
  }
  $('publish').onclick=async ()=>{
    if(!fileBuf) return;
    const el=$('publog'); el.innerHTML=''; $('publish').disabled=true;
    try{
      plog(el,'上傳中（'+fileName+'）…');
      const j=await api('/api/publish',{method:'POST',body:JSON.stringify({content_b64:toBase64(fileBuf), message:'data: 更新淨值表至 '+(analyzed?analyzed.end:'')+'（via Portal）'})});
      plog(el,'✓ 已提交：'+(j.commit||'').slice(0,7),'ok');
      plog(el,'✓ 發布完成。GitHub Pages 將在約 1 分鐘內自動重新部署。','ok');
      if(j.url) plog(el,'提交記錄：'+j.url,'dim');
    }catch(e){ plog(el,'✗ 發布失敗：'+e.message,'err'); }
    $('publish').disabled=false;
  };

  /* ── ② 帳號管理 ── */
  async function loadUsers(){
    const el=$('users');
    try{
      const j=await api('/api/users');
      let h='<table class="m"><thead><tr><th>用戶名</th><th>郵箱</th><th>方式</th><th>狀態</th><th>註冊時間</th><th>最近登入</th><th>操作</th></tr></thead><tbody>';
      h+=`<tr><td>${j.admin}</td><td>—</td><td>admin</td><td><span class="badge on">啟用</span></td><td>—</td><td>—</td><td class="dim">（管理員憑證在 Worker Secrets 中修改）</td></tr>`;
      j.users.forEach(u=>{
        const t=s=>s?s.replace('T',' ').slice(0,16):'—';
        h+=`<tr><td>${u.username}</td><td>${u.email||'—'}</td><td>${u.provider==='google'?'Google':'密碼'}</td>
          <td><span class="badge ${u.disabled?'off':'on'}">${u.disabled?'停用':'啟用'}</span></td>
          <td>${t(u.created)}</td><td>${t(u.lastLogin)}</td>
          <td>
            <button class="btn2" data-a="${u.disabled?'enable':'disable'}" data-u="${u.username}">${u.disabled?'啟用':'停用'}</button>
            <button class="btn2" data-a="resetpw" data-u="${u.username}">重置密碼</button>
            <button class="btn2 danger" data-a="delete" data-u="${u.username}">刪除</button>
          </td></tr>`;
      });
      h+='</tbody></table>';
      if(!j.users.length) h+='<div class="dim" style="margin-top:12px;font-family:var(--mono);font-size:12px">暫無訪客帳號。訪客可在 login.html 的 Guest Sign up 註冊。</div>';
      el.className=''; el.innerHTML=h;
      el.querySelectorAll('button[data-a]').forEach(b=>b.onclick=async ()=>{
        const a=b.dataset.a, u=b.dataset.u;
        let body={username:u, action:a};
        if(a==='delete' && !confirm('確定刪除帳號「'+u+'」？此操作不可恢復。')) return;
        if(a==='resetpw'){ const np=prompt('輸入「'+u+'」的新密碼（至少 6 位）：'); if(!np) return; body.newPassword=np; }
        try{ await api('/api/users/update',{method:'POST',body:JSON.stringify(body)}); loadUsers(); }
        catch(e){ alert('✗ '+e.message); }
      });
    }catch(e){ el.textContent='✗ '+e.message; }
  }

  /* ── ③ 登出 ── */
  $('logout').onclick=async ()=>{
    try{ await api('/api/logout',{method:'POST'}); }catch(e){}
    ['yc-token','yc-role','yc-user'].forEach(k=>localStorage.removeItem(k)); location.href='login.html';
  };
})();
</script>
<script src="assets/yc-session.js"></script>
</body>
</html>
