<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳號管理 ｜ Admin ｜ Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script src="assets/portal-config.js"></script>
<script src="assets/yc-admin.js"></script>
</head>
<body>

<header><div class="wrap nav">
  <a class="logo" href="./">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="admin">Admin 總覽</a></li></ul></nav>
</div></header>

<div class="wrap">
  <div class="page-hero">
    <div class="crumb">ADMIN / USERS</div>
    <div class="topbar">
      <h1 style="margin:0"><small>Backstage · 管理後台</small>帳號管理</h1>
      <div class="who" id="who"></div>
    </div>
    <div id="adminnav"></div>
  </div>

  <div id="gate" class="card" style="text-align:center;padding:60px">
    <div class="log dim" style="display:inline-block" id="gatemsg">正在驗證會話…</div>
  </div>

  <div id="panel" style="display:none">

    <div class="card">
      <h3>帳號管理</h3>
      <div class="searchline">
        <input id="usr-q" placeholder="搜索用戶名或郵箱…" autocomplete="off">
        <button class="btn2" id="usr-refresh">刷新</button>
        <span class="dim" id="usr-count" style="font-family:var(--mono);font-size:12px"></span>
      </div>
      <div id="users" class="log dim">載入中…</div>
      <div class="dim" style="font-family:var(--mono);font-size:11.5px;line-height:1.9;margin-top:14px">
        密碼以 PBKDF2 單向哈希存儲，任何人（包括管理員）都無法查看原文——這是保護用戶的行業標準做法；需要時用「重置密碼」直接設一個新密碼即可。用戶自己也可在登入頁用「忘記密碼」自助重設。
      </div>
    </div>

  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const {api, $}=YCAdmin;
  let USERS=[], ADMIN='';
  YCAdmin.gate(loadUsers);
  $('usr-refresh').onclick=loadUsers;
  $('usr-q').addEventListener('input',draw);

  async function loadUsers(){
    const el=$('users');
    try{
      const j=await api('/api/users');
      USERS=j.users; ADMIN=j.admin; draw();
    }catch(e){ el.textContent='✗ '+e.message; }
  }
  function draw(){
    const el=$('users');
    const q=$('usr-q').value.trim().toLowerCase();
    const list=USERS.filter(u=>!q || (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q));
    $('usr-count').textContent=q?('匹配 '+list.length+' / '+USERS.length):('共 '+USERS.length+' 個訪客帳號');
    let h='<table class="m"><thead><tr><th>用戶名</th><th>郵箱</th><th>方式</th><th>訂閱 Insights</th><th>狀態</th><th>註冊時間</th><th>最近登入</th><th>操作</th></tr></thead><tbody>';
    if(!q) h+=`<tr><td>${ADMIN}</td><td>—</td><td>admin</td><td>—</td><td><span class="badge on">啟用</span></td><td>—</td><td>—</td><td class="dim">（管理員憑證在 Worker Secrets 中修改）</td></tr>`;
    list.forEach(u=>{
      const t=s=>s?s.replace('T',' ').slice(0,16):'—';
      h+=`<tr><td>${u.username}</td><td>${u.email||'—'}</td><td>${u.provider==='google'?'Google':'密碼'}</td><td>${u.newsletter?'<span class="badge on">已訂閱</span>':'<span class="badge off">未訂閱</span>'}</td>
        <td><span class="badge ${u.disabled?'off':'on'}">${u.disabled?'停用':'啟用'}</span></td>
        <td>${t(u.created)}</td><td>${t(u.lastLogin)}</td>
        <td>
          <button class="btn2" data-a="${u.disabled?'enable':'disable'}" data-u="${u.username}">${u.disabled?'啟用':'停用'}</button>
          <button class="btn2" data-a="resetpw" data-u="${u.username}">重置密碼</button>
          <button class="btn2 danger" data-a="delete" data-u="${u.username}">刪除</button>
        </td></tr>`;
    });
    h+='</tbody></table>';
    if(!USERS.length) h+='<div class="dim" style="margin-top:12px;font-family:var(--mono);font-size:12px">暫無訪客帳號。訪客可在登入頁註冊。</div>';
    el.className=''; el.innerHTML=h;
    el.querySelectorAll('button[data-a]').forEach(b=>b.onclick=async ()=>{
      const a=b.dataset.a, u=b.dataset.u;
      let body={username:u, action:a};
      if(a==='delete' && !confirm('確定刪除帳號「'+u+'」？此操作不可恢復。')) return;
      if(a==='resetpw'){ const np=prompt('輸入「'+u+'」的新密碼（至少 6 位）：'); if(!np) return; body.newPassword=np; }
      try{ await api('/api/users/update',{method:'POST',body:JSON.stringify(body)}); loadUsers(); }
      catch(e){ alert('✗ '+e.message); }
    });
  }
})();
</script>
</body>
</html>
