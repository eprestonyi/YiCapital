<!DOCTYPE html>
<html lang="en">
<head>
<script>window.YC_LANG='en';</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Yi Capital</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script src="../assets/portal-config.js"></script>
<script src="../assets/yc-i18n.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body{overflow-x:hidden}

  .bgfx{position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:
      linear-gradient(rgba(34,211,238,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(34,211,238,.035) 1px,transparent 1px);
    background-size:56px 56px}
  .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;animation:drift 22s ease-in-out infinite alternate}
  .orb.a{width:520px;height:520px;background:radial-gradient(circle,#0e7490,transparent 65%);top:-160px;left:-120px}
  .orb.b{width:460px;height:460px;background:radial-gradient(circle,#1d4ed8,transparent 65%);bottom:-140px;right:-100px;animation-delay:-8s}
  .orb.c{width:320px;height:320px;background:radial-gradient(circle,#7c3aed,transparent 65%);top:38%;left:58%;animation-delay:-15s;opacity:.3}
  @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(70px,50px) scale(1.12)}}

  .login-wrap{max-width:460px;margin:48px auto 100px;padding:0 24px}
  .brand-hero{text-align:center;margin-bottom:30px}
  .brand-hero .logo{font-size:30px}
  .slogan{margin-top:14px;font-family:var(--sans);font-weight:600;font-size:16.5px;line-height:1.7;letter-spacing:.3px;
    background:linear-gradient(90deg,#8fd8e8,#22d3ee,#3b82f6,#8b5cf6,#22d3ee);background-size:280% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 7s linear infinite}
  @keyframes shine{to{background-position:280% center}}

  .card{background:rgba(10,18,31,.86);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:14px;padding:30px 30px 26px;
    box-shadow:0 24px 70px rgba(0,0,0,.45);animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .seg{position:relative;display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:24px}
  .seg button{flex:1;position:relative;z-index:1;background:none;border:none;color:var(--muted);padding:11px 0;
    font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:color .25s}
  .seg button.on{color:#04070d}
  .seg .pill{position:absolute;top:4px;bottom:4px;left:4px;width:50%;width:calc(50% - 4px);border-radius:7px;
    background:linear-gradient(90deg,var(--cyan),var(--blue));transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .seg.right .pill{transform:translateX(100%)}

  .fld{margin-bottom:15px}
  .fld label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;text-transform:uppercase}
  .fld input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:12px 14px;font-size:14.5px;font-family:var(--zh);transition:border-color .2s,box-shadow .2s}
  .fld input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.12)}

  .chk{display:flex;gap:10px;align-items:flex-start;margin:0 0 12px;font-size:13px;color:#aab6c6;line-height:1.7;cursor:pointer}
  .chk input{margin-top:3px;accent-color:#22d3ee;width:15px;height:15px;flex:none;cursor:pointer}
  .chk a{color:var(--cyan)}

  .btn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));color:#04070d;border:none;border-radius:8px;padding:13px;
    font-family:var(--sans);font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;transition:transform .15s,box-shadow .2s}
  .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(34,211,238,.28)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .msg{margin-top:14px;font-family:var(--mono);font-size:12.5px;line-height:1.8;min-height:20px}
  .msg.ok{color:var(--up)} .msg.err{color:var(--down)}
  .divider{text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;margin:16px 0 12px}
  .adminlink{text-align:center;margin-top:18px}
  .adminlink a{color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:1px;text-decoration:none;border-bottom:1px dashed var(--line)}
  .adminlink a:hover{color:var(--cyan);border-color:var(--cyan)}
  .cfg-warn{border:1px solid var(--down);border-radius:8px;padding:14px 18px;color:var(--down);font-size:13px;line-height:1.8;margin-bottom:22px}
  .cfg-warn code{font-family:var(--mono);background:var(--bg);padding:1px 6px;border-radius:4px;color:#cdd6e3}
</style>
</head>
<body>
<div class="bgfx"><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div></div>

<header><div class="wrap nav">
  <a class="logo" href="index.html">Yi<b>Capital</b></a>
  <nav><ul id="m"><li><a class="link" href="index.html">← Back to home</a></li></ul></nav>
</div></header>

<div class="login-wrap">
  <div class="brand-hero">
    <div class="logo">Yi<b>Capital</b></div>
    <div class="slogan">Key to Extraordinary Research<br>and Opensource Portfolio</div>
  </div>

  <div id="cfgwarn" class="cfg-warn" style="display:none">Backend not configured: put your workers.dev URL into <code>assets/portal-config.js</code>'s <code>YC_API</code>. </div>

  <div class="card">
    
    <div class="seg" id="seg">
      <div class="pill"></div>
      <button class="on" data-mode="login">Login</button>
      <button data-mode="signup">Sign up</button>
    </div>

    <div class="fld"><label id="ulabel">Username / Email</label><input id="u" autocomplete="username"></div>
    <div class="fld" id="emailwrap" style="display:none"><label>Email</label><input id="email" type="email" autocomplete="email" placeholder="Used to receive the verification code"></div>
    <div class="fld"><label>Password</label><input id="p" type="password" autocomplete="current-password"></div>
    <div class="fld" id="p2wrap" style="display:none"><label>Confirm Password</label><input id="p2" type="password" autocomplete="new-password"></div>
    <div class="fld" id="codewrap" style="display:none"><label>Verification Code</label><input id="vcode" inputmode="numeric" placeholder="6 digits"></div>

    <div id="chkwrap" style="display:none">
      <label class="chk"><input type="checkbox" id="chk-news" checked>
        <span>Subscribe to <b>Yi Capital Insights</b> — new research, shareholder letters and NAV updates (unsubscribe anytime; optional)</span></label>
      <label class="chk"><input type="checkbox" id="chk-terms" checked>
        <span>I have read and agree to the <a href="terms.html" target="_blank">Terms of Service</a> (no abuse or attacks, respect copyright — but copying the homework is welcome, so is reaching out)<b style="color:var(--down)"> *required</b></span></label>
    </div>

    <button class="btn" id="go">Login</button>
    <div id="gwrap" style="display:none"><div class="divider">─── or ───</div><div id="gbtn" style="display:flex;justify-content:center"></div></div>
    <div class="msg" id="msg"></div>

    <div class="adminlink"><a href="#" id="adminlink">Admin Login →</a></div>
  </div>
</div>

<footer><div class="wrap"><div class="logo">Yi<b>Capital</b></div><p>© 2026 Yi Capital.</p></div></footer>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const API=(window.YC_API||'').replace(/\/+$/,'');
  if(!API) $('cfgwarn').style.display='block';

  let mode='login';       // login | signup | admin
  let pendingEmail=null;  
  let setupToken=null;    

  function apply(){
    const seg=$('seg');
    seg.style.display=(mode==='admin')?'none':'flex';
    seg.classList.toggle('right',mode==='signup');
    seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
    $('emailwrap').style.display=mode==='signup'?'block':'none';
    $('p2wrap').style.display=mode==='signup'?'block':'none';
    $('chkwrap').style.display=mode==='signup'?'block':'none';
    $('codewrap').style.display='none';
    $('ulabel').textContent=mode==='signup'?'Username':(mode==='admin'?'Admin Username':'Username / Email');
    $('go').textContent=mode==='signup'?'Create account':(mode==='admin'?'Admin Login':'Login');
    $('adminlink').textContent=mode==='admin'?'← Back to user login':'Admin Login →';
    $('gwrap').style.display=(mode!=='admin'&&GCID&&API)?'block':'none';
    pendingEmail=null; setupToken=null;
    $('msg').textContent=''; $('msg').className='msg';
  }
  document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;apply();});
  $('adminlink').onclick=e=>{e.preventDefault();mode=(mode==='admin')?'login':'admin';apply();};

  async function api(path,body){
    const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json().catch(()=>({error:'Failed to parse response'}));
    if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
    return j;
  }
  function sessionIn(j,msg){
    localStorage.setItem('yc-token',j.token); localStorage.setItem('yc-role',j.role); localStorage.setItem('yc-user',j.username);
    msg.className='msg ok';
    msg.textContent='✓ Signed in'+(j.role==='admin'?' — entering the admin console…':' ('+j.username+') — returning to the home page…');
    setTimeout(()=>location.href=(j.role==='admin'?'admin.html':'index.html'),900);
  }

  const GCID=window.YC_GOOGLE_CLIENT_ID||'';
  if(GCID&&API){
    const init=()=>{ if(!window.google||!google.accounts){setTimeout(init,300);return;}
      google.accounts.id.initialize({client_id:GCID,callback:async resp=>{
        const msg=$('msg'); msg.className='msg'; msg.textContent='Verifying Google account…';
        try{
          const j=await api('/api/google',{credential:resp.credential});
          if(j.needSetup){
            setupToken=j.setupToken;
            mode='signup'; apply(); setupToken=j.setupToken; 
            $('emailwrap').style.display='none'; $('gwrap').style.display='none';
            $('go').textContent='Create account';
            $('msg').className='msg ok';
            $('msg').textContent='✓ Google verified ('+j.email+') — now set your username and password';
          } else sessionIn(j,msg);
        }catch(e){msg.className='msg err';msg.textContent='✗ '+e.message;}
      }});
      google.accounts.id.renderButton($('gbtn'),{theme:'filled_black',size:'large',text:'continue_with',width:300});
      if(mode!=='admin')$('gwrap').style.display='block';
    }; init();
  }

  $('go').onclick=async ()=>{
    const msg=$('msg'); msg.className='msg'; msg.textContent='';
    if(!API){msg.className='msg err';msg.textContent='Backend not configured (see notice above)';return;}
    const u=$('u').value.trim(), p=$('p').value;
    $('go').disabled=true;
    try{

      if(setupToken){
        if(!u||!p) throw new Error('Please enter a username and password');
        if(p!==$('p2').value) throw new Error('Passwords do not match');
        if(!$('chk-terms').checked) throw new Error('You must agree to the Terms of Service to sign up');
        const j=await api('/api/google/complete',{setupToken,username:u,password:p,newsletter:$('chk-news').checked,terms:true});
        setupToken=null; sessionIn(j,msg);
      }

      else if(mode==='signup'&&pendingEmail){
        const code=$('vcode').value.trim();
        if(!/^\d{6}$/.test(code)) throw new Error('Please enter the 6-digit code');
        await api('/api/verify',{email:pendingEmail,code});
        pendingEmail=null;
        mode='login'; apply();
        $('msg').className='msg ok'; $('msg').textContent='✓ Verified! Please log in to your new account';
      }

      else if(mode==='signup'){
        const email=$('email').value.trim();
        if(!u||!p||!email) throw new Error('Please fill in username, email and password');
        if(p!==$('p2').value) throw new Error('Passwords do not match');
        if(!$('chk-terms').checked) throw new Error('You must agree to the Terms of Service to sign up');
        const j=await api('/api/signup',{username:u,password:p,email,newsletter:$('chk-news').checked,terms:true});
        if(j.needCode){
          pendingEmail=email.toLowerCase();
          $('codewrap').style.display='block'; $('go').textContent='Submit code';
          msg.className='msg ok'; msg.textContent='✓ '+j.message+' — check your inbox (and spam folder)';
        }else{ mode='login'; apply(); $('msg').className='msg ok'; $('msg').textContent='✓ Registered! Please log in'; }
      }

      else{
        if(!u||!p) throw new Error('Please enter your account and password');
        const j=await api('/api/login',{username:u,password:p});
        if(mode==='admin'&&j.role!=='admin') throw new Error('This account is not an administrator');
        sessionIn(j,msg);
      }
    }catch(e){msg.className='msg err';msg.textContent='✗ '+e.message;}
    $('go').disabled=false;
  };
  $('p').addEventListener('keydown',e=>{if(e.key==='Enter'&&mode!=='signup')$('go').click();});
  apply();
})();
</script>
</body>
</html>
